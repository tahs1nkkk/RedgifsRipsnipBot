<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#08070a">
  <title>Tasu Archive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Zemindeki renk yıkaması. Sabit ve etkileşimsiz; her katman onun üstünde. -->
  <div class="aura" aria-hidden="true"></div>

  <!-- ============================================================ 1. kapı ==
       Girişte tek soru: listeler mi, medya mı. İki yarım, ekranı tam kaplar. -->
  <section id="chooser" class="chooser" aria-label="Bölüm seç">
    <button class="half half-lists" data-go="lists">
      <span class="half-inner">
        <span class="half-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <path d="M4 6h16M4 12h16M4 18h10"/>
          </svg>
        </span>
        <span class="half-title">Listeler</span>
        <span class="half-sub">kaydettiğin bağlantılar</span>
        <span class="half-count" id="chooser-lists">–</span>
      </span>
    </button>
    <button class="half half-media" data-go="media">
      <span class="half-inner">
        <span class="half-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="16" rx="3"/><circle cx="8.5" cy="9.5" r="1.6"/>
            <path d="M4 17l4.5-5 3.5 4 3-2.5L20 17"/>
          </svg>
        </span>
        <span class="half-title">Medya</span>
        <span class="half-sub">indirdiğin her şey</span>
        <span class="half-count" id="chooser-media">–</span>
      </span>
    </button>
  </section>

  <!-- ========================================================== 2. uygulama -->
  <div id="app" class="app" hidden>
    <header class="topbar">
      <button id="btn-drives" class="icon-btn" aria-label="Arşivler" title="Arşivler">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M4 7h16M4 12h16M4 17h16"/>
        </svg>
      </button>

      <div class="brand">
        <span class="brand-dot" id="brand-dot"></span>
        <span class="brand-name" id="brand-name">Tasu Arşiv</span>
        <span class="brand-ver" id="brand-ver">v1.1</span>
      </div>

      <span class="grow"></span>

      <!-- Hover'da genişleyip renk değiştiren "+ Dosya Ekle". -->
      <button id="btn-add" class="add-btn" aria-label="Dosya ekle">
        <span class="add-plus" aria-hidden="true">+</span>
        <span class="add-label">Dosya Ekle</span>
      </button>

      <button id="btn-refresh" class="icon-btn" aria-label="Yenile" title="Yenile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M20 11a8 8 0 1 0-2.3 5.7"/><path d="M20 5v6h-6"/>
        </svg>
      </button>
      <button id="btn-logout" class="icon-btn" aria-label="Çıkış yap" title="Çıkış yap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M15 17l5-5-5-5M20 12H9M12 20H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h6"/>
        </svg>
      </button>
    </header>

    <!-- Sayfa geçişleri: ekranın iki kenarında, her zaman erişilebilir. -->
    <button class="edge edge-left" id="edge-left" aria-label="Listeler">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
      <span class="edge-label">Listeler</span>
    </button>
    <button class="edge edge-right" id="edge-right" aria-label="Medya">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
      <span class="edge-label">Medya</span>
    </button>

    <main class="stage">
      <!-- ------------------------------------------------------- listeler -->
      <section id="view-lists" class="view" hidden aria-label="Listeler">
        <div class="toolbar">
          <label class="field grow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
            <input id="lists-search" type="search" placeholder="Listelerde ara…" aria-label="Listelerde ara">
          </label>
          <button id="lists-collapse" class="pill">Hepsini kapat</button>
        </div>
        <div id="lists-root" class="lists-root"></div>
      </section>

      <!-- ---------------------------------------------------------- medya -->
      <section id="view-media" class="view" hidden aria-label="Medya">
        <!-- Site sekmeleri: üstte kalır, asla alt satıra kaymaz. -->
        <nav id="site-tabs" class="site-tabs" aria-label="Kaynak site"></nav>

        <div class="toolbar">
          <label class="field grow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
            <input id="media-search" type="search" placeholder="Dosya adında ara…" aria-label="Medyada ara">
          </label>
          <button id="media-sort" class="pill">Yeni → eski</button>
          <button id="media-select" class="pill">Seç</button>
        </div>

        <div id="cat-bar" class="cat-bar"></div>
        <div id="media-root" class="media-grid"></div>
      </section>
    </main>

    <!-- İstatistik: sayfanın altında, ortalanmış, her zaman el altında. -->
    <div id="media-stats" class="stats-dock" hidden></div>

    <!-- Seçim modu eylem çubuğu -->
    <div id="select-bar" class="select-bar" hidden>
      <span class="sel-count" id="sel-count">0 seçildi</span>
      <span class="grow"></span>
      <button class="pill" data-act="all">Tümünü seç</button>
      <button class="pill" data-act="cat">Kategoriye taşı</button>
      <button class="pill" data-act="site">Siteye taşı</button>
      <button class="pill" data-act="share">Paylaş</button>
      <button class="pill danger" data-act="delete">Sil</button>
      <button class="pill" data-act="cancel">Vazgeç</button>
    </div>
  </div>

  <!-- =========================================================== katmanlar -->
  <aside id="drive-drawer" class="drawer" hidden aria-label="Arşivler"></aside>
  <div id="scrim" class="scrim" hidden></div>

  <div id="viewer" class="viewer" hidden aria-label="Medya görüntüleyici"></div>
  <div id="dialogs" class="dialog-host"></div>
  <div id="toasts" class="toast-host" role="status" aria-live="polite"></div>

  <input id="file-input" type="file" multiple hidden>

  <script type="module" src="js/app.js"></script>
</body>
</html>
