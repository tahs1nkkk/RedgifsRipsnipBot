# XcodeGen spec — the Xcode project is generated on the CI runner, never
# committed. This is what makes Mac-less development workable: the project
# definition is reviewable YAML instead of a pbxproj.
name: RipSnip
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  RipSnip:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      # Generated by scripts/build-ios-app-js.js before xcodegen runs.
      - path: Resources
        buildPhase: resources
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: RipSnip
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSPhotoLibraryAddUsageDescription: İndirilen medya Fotoğraflar kitaplığına kaydedilir.
        NSPhotoLibraryUsageDescription: Galeri sekmesi, bu uygulamayla indirilen öğeleri Fotoğraflar kitaplığından gösterir.
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lsatv.ripsnip
        TARGETED_DEVICE_FAMILY: "1,2"
        # Unsigned on purpose: SideStore/AltStore re-signs on the phone with a
        # free Apple ID. Signing on CI would need a paid account.
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGN_IDENTITY: ""
        DEVELOPMENT_TEAM: ""
schemes:
  RipSnip:
    build:
      targets:
        RipSnip: all
    run:
      config: Release
