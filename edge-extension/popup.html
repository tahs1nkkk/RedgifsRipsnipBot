<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="popup.css">
    <title>RedGifs Downloader</title>
  </head>
  <body>
    <main class="panel">
      <header class="topbar">
        <div class="brand">
          <img src="icon.svg" alt="" aria-hidden="true">
          <div>
            <h1>RedGifs Downloader</h1>
            <span id="version"></span>
          </div>
        </div>
      </header>

      <details class="site" open>
        <summary>Redgifs</summary>
        <div class="site-body">
          <label class="row">
            <span>
              <strong>Right Shift ile indir</strong>
              <small>Sağ Shift'e basınca ekrandaki videoyu indirir</small>
            </span>
            <input type="checkbox" data-setting="rightShiftDownload">
          </label>

          <label class="row">
            <span>
              <strong>Profil fotoğrafı indirme</strong>
              <small>Profil avatarının üstüne gelince indirme butonu çıkar</small>
            </span>
            <input type="checkbox" data-setting="redgifsAvatarDownload">
          </label>

          <label class="row" id="ripsnipRow">
            <span>
              <strong>Ripsnip açıksa onu kullan</strong>
              <small id="ripsnipHint">Kapalıysa CDN/Redgifs medya çözümü kullanılır</small>
            </span>
            <input type="checkbox" data-setting="ripsnipWhenOpen">
          </label>
        </div>
      </details>

      <details class="site">
        <summary>Reddit</summary>
        <div class="site-body">
          <label class="row">
            <span>
              <strong>Görselleri indirme</strong>
              <small>Reddit görsel postları için</small>
            </span>
            <input type="checkbox" data-setting="redditImages">
          </label>

          <label class="row">
            <span>
              <strong>Profil resimlerinde buton gizle</strong>
              <small>Reddit avatarlarını dışarıda bırakır</small>
            </span>
            <input type="checkbox" data-setting="hideRedditProfileAvatars">
          </label>
        </div>
      </details>

      <details class="site">
        <summary>Scrolller</summary>
        <div class="site-body">
          <label class="row">
            <span>
              <strong>İndirme butonu</strong>
              <small>Fotoğraf, gif ve videolar için sol üstte buton</small>
            </span>
            <input type="checkbox" data-setting="scrolllerButtons">
          </label>
          <button id="downloadScrolllerCurrent" class="secondary-action" type="button">Görünen medyayı indir</button>
          <div class="button-row">
            <button id="pickScrolllerElement" class="secondary-action" type="button">Öğe gizle</button>
            <button id="resetScrolllerElements" class="secondary-action" type="button">Gizlenenleri geri getir</button>
          </div>
          <small id="scrolllerActionStatus" class="folder-status"></small>
        </div>
      </details>

      <details class="site">
        <summary>Coomer</summary>
        <div class="site-body">
          <label class="row">
            <span>
              <strong>Post eklerinde indirme butonu</strong>
              <small>Profil önizlemelerini atlar; post içindeki gerçek ekleri kullanıcı adına göre klasörler</small>
            </span>
            <input type="checkbox" data-setting="coomerButtons">
          </label>
        </div>
      </details>

      <details class="site">
        <summary>Instagram</summary>
        <div class="site-body">
          <label class="row">
            <span>
              <strong>İndirme butonu</strong>
              <small>Post/reel medyası ve profil fotoğrafı (mavi: tekli, pembe: tümü)</small>
            </span>
            <input type="checkbox" data-setting="instagramButtons">
          </label>
        </div>
      </details>

      <details class="site">
        <summary>Global</summary>
        <div class="site-body">
          <label class="row">
            <span>
              <strong>Buton görünürlüğü</strong>
              <small>Tüm sitelerde geçerli</small>
            </span>
            <select data-setting="buttonVisibility">
              <option value="hover">Hover</option>
              <option value="always">Her zaman</option>
            </select>
          </label>

          <label class="row">
            <span>
              <strong>Ana klasör adı</strong>
              <small>Menüde "Ana klasör" seçilince buraya iner</small>
            </span>
            <input class="text-input" type="text" data-setting="downloadPath" spellcheck="false">
          </label>

          <label class="row">
            <span>
              <strong>Klasör düzeni</strong>
              <small>Düzenli: ana klasör / site / fotoğraf-video / seçim</small>
            </span>
            <select data-setting="folderLayout">
              <option value="organized">Siteye göre</option>
              <option value="legacy">Eski düzen</option>
            </select>
          </label>

          <label class="row">
            <span>
              <strong>Dosya adına tarih ekle</strong>
              <small>Kapatılırsa sadece video adı kullanılır</small>
            </span>
            <input type="checkbox" data-setting="includeDateInFilename">
          </label>

          <label class="stack">
            <span>
              <strong>İndirme butonu boyutu</strong>
              <small><output id="buttonSizeValue"></output></small>
            </span>
            <input type="range" min="28" max="72" step="2" data-setting="buttonSize">
          </label>

          <div class="stack">
            <span>
              <strong>Klasörler</strong>
              <small>İndirirken menüde çıkar; fotoğraf/video klasörünün altına eklenir</small>
            </span>
            <div id="folderList" class="folder-list"></div>
            <div class="folder-add">
              <input id="folderNew" class="text-input wide" type="text" placeholder="Yeni klasör adı" spellcheck="false">
              <button id="folderAdd" type="button" class="secondary-action">Ekle</button>
            </div>
            <small id="folderStatus" class="folder-status"></small>
          </div>
        </div>
      </details>

      <button id="openDebugGuide" class="secondary-action" type="button">Debug rehberini aç</button>
      <button id="reset" type="button">Varsayılana dön</button>
    </main>
    <script src="common/settings.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
